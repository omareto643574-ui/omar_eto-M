<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>OMAR Eto - تشكيل الفريق</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>OMAR Eto - حدد مركزك</h1>
<div id="field">
  <div id="omar-name">OMAR Eto</div>
</div>

<div id="players">
  <div class="player-choice">
    <label>أحمد:</label>
    <select class="position-select" data-player="Ahmed">
      <option value="GK">حارس مرمى</option>
      <option value="DF">مدافع</option>
      <option value="MF">وسط</option>
      <option value="FW">مهاجم</option>
    </select>
    <button onclick="setPosition(this)">تأكيد</button>
  </div>
  
  <div class="player-choice">
    <label>محمد:</label>
    <select class="position-select" data-player="Mohamed">
      <option value="GK">حارس مرمى</option>
      <option value="DF">مدافع</option>
      <option value="MF">وسط</option>
      <option value="FW">مهاجم</option>
    </select>
    <button onclick="setPosition(this)">تأكيد</button>
  </div>

  <!-- ممكن تضيف صحابك زيادة بنفس الطريقة -->
</div>

<script src="script.js"></script>
</body>
</html>
