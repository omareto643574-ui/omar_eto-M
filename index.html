<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>OMAR Eto - فريق كامل بدون صور</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🔥 OMAR Eto - فريق كامل ضد AI 🔥</h1>

<div id="timer">04:00</div>

<div class="scoreboard">
  <div>🔴 أنت: <span id="playerScore">0</span></div>
  <div>🔵 AI: <span id="aiScore">0</span></div>
</div>

<div class="field" id="field">
  <div class="goal goal-left"></div>
  <div class="goal goal-right"></div>

  <!-- فريقك -->
  <div class="player" id="player1" data-name="Ronaldo"></div>
  <div class="player" id="player2" data-name="Messi"></div>
  <div class="player" id="player3" data-name="Neymar"></div>

  <!-- فريق AI -->
  <div class="ai" id="ai1" data-name="AI1"></div>
  <div class="ai" id="ai2" data-name="AI2"></div>
  <div class="ai" id="ai3" data-name="AI3"></div>

  <div class="ball" id="ball"></div>
</div>

<div class="buttons">
  <button onclick="startMatch()">ابدأ ماتش</button>
  <button onclick="resetGame()">Reset</button>
</div>

<script src="script.js"></script>
</body>
</html>
